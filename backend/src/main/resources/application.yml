spring:
  application:
    name: cinema-backend

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/cinema_ebooking?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME:cinema_user}
    password: ${DB_PASSWORD:cinema_password}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:cinemaebooking9@gmail.com}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_STARTTLS:true}

app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  mail-from: ${MAIL_FROM:cinemaebooking9@gmail.com}

server:
  port: 8080
  servlet:
    session:
      cookie:
        http-only: true
        same-site: lax
      timeout: 30m
