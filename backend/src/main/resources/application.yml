spring:
  application:
    name: cinema-backend

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/cinema_ebooking?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME:cinema_user}
    password: ${DB_PASSWORD:cinema_password}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true

server:
  port: 8080